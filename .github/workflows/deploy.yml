name: Build & Deploy (static site)

# Tier 1: bake data (re.is fresh; POI/wiki from committed cache; curated),
# export the Next.js site, publish to GitHub Pages.
on:
  schedule:
    - cron: "23 5 * * *" # 05:23 UTC daily (Iceland is UTC year-round); off :00 to dodge cron congestion
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "scripts/**"
      - "data/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer run supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build data → frontend/public/data
        run: node scripts/build-all.mjs

      - name: Install frontend
        working-directory: frontend
        # `npm install` (not `ci`): tolerant of optional-dep lockfile drift
        # across npm versions (lesson from ConcertFinder's deploy).
        run: npm install --no-audit --no-fund

      - name: Build static site (export → frontend/out)
        working-directory: frontend
        run: npm run build

      # Stop GitHub Pages' Jekyll from stripping the _next/ folder.
      - name: Disable Jekyll on the artifact
        run: touch frontend/out/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
