name: Live data (roads / weather / hazards)

# Tier 2: every ~30 min, refresh the small live JSONs on the orphan `data`
# branch (ONE amended commit, force-pushed — the branch never grows).
# The site fetches them client-side from raw.githubusercontent.com (CORS *).
# live-all.mjs always exits 0; status.json is the health signal.
on:
  schedule:
    - cron: "7,37 * * * *" # offset from :00/:30 congestion
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize runs; force-push is atomic and every run regenerates everything,
# so cancelling an in-flight run loses nothing.
concurrency:
  group: live-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4 # main: scripts + station registry
      - uses: actions/checkout@v4 # data branch: previous outputs = last-good seed
        with:
          ref: data
          path: data-branch
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch live datasets into the data-branch worktree
        run: node scripts/live-all.mjs --out data-branch

      - name: Amend the single data commit & force-push
        working-directory: data-branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing changed (unexpected — status.json updates every run)"
            exit 0
          fi
          git commit --amend -m "live data $(date -u +%FT%TZ)"
          git push --force origin data
